# Актуальные параметры для камеры RealSense D435i (ROS2 Humble)
# Имена параметров взяты из вывода ros2 param list
/camera/camera:
  ros__parameters:
    # ========== Подключение и идентификация ==========
    serial_no: ''
    usb_port_id: ''
    _device_type: ''                     # в списке параметров с подчёркиванием
    _usb_port_id: ''                      # тоже с подчёркиванием
    wait_for_device_timeout: -1.0
    reconnect_timeout: 6.0
    initial_reset: false
    rosbag_filename: ''                   # для воспроизведения из bag

    # ========== Включение потоков ==========
    enable_color: true
    enable_depth: true
    enable_infra1: false
    enable_infra2: false
    enable_gyro: true
    enable_accel: true

    # ========== Профили и форматы ==========
    rgb_camera.color_profile: '1920x1080x30'
    rgb_camera.color_format: 'RGB8'
    depth_module.depth_profile: '640x480x30'
    depth_module.depth_format: 'Z16'
    depth_module.infra_profile: '640x480x30'   # общий профиль для инфракрасных
    depth_module.infra1_format: 'Y8'
    depth_module.infra2_format: 'Y8'

    # Для IMU частоты не видны в списке параметров – обычно они фиксированы (400/250)
    # Если нужно изменить, используйте json_file_path с пользовательской конфигурацией
    # json_file_path: '/path/to/config.json'

    # ========== IMU ==========
    unite_imu_method: 2
    linear_accel_cov: 0.01
    angular_velocity_cov: 0.01
    hold_back_imu_for_frames: false

    # ========== Синхронизация и выравнивание ==========
    enable_sync: true
    align_depth.enable: true

    # ========== Фильтры ==========
    pointcloud.enable: true
    pointcloud.stream_filter: 2
    pointcloud.stream_index_filter: 0
    pointcloud.allow_no_texture_points: false
    pointcloud.ordered_pc: false
    pointcloud.pointcloud_qos: 'SENSOR_DATA'

    spatial_filter.enable: true
    spatial_filter.filter_smooth_alpha: 0.5
    spatial_filter.filter_smooth_delta: 20
    spatial_filter.holes_fill: 0

    temporal_filter.enable: true
    temporal_filter.filter_smooth_alpha: 0.4
    temporal_filter.filter_smooth_delta: 20
    temporal_filter.holes_fill: 3           # persistency

    hole_filling_filter.enable: false
    hole_filling_filter.holes_fill: 1

    decimation_filter.enable: false
    decimation_filter.filter_magnitude: 2

    disparity_filter.enable: false
    # Параметр disparity_to_depth.enable есть в списке – используем его
    disparity_to_depth.enable: true

    colorizer.enable: false
    colorizer.color_scheme: 0               # можно настроить

    # HDR (необязательно)
    hdr_merge.enable: false
    depth_module.hdr_enabled: false
    depth_module.sequence_id: 0
    # Параметры экспозиции для последовательностей (если HDR включён)
    depth_module.exposure: 10000
    depth_module.gain: 16

    # Поворот
    rotation_filter.enable: false
    rotation_filter.rotation: 0.0

    # ========== QoS ==========
    depth_qos: 'SENSOR_DATA'
    color_qos: 'SYSTEM_DEFAULT'
    infra1_qos: 'SYSTEM_DEFAULT'
    infra2_qos: 'SYSTEM_DEFAULT'
    depth_info_qos: 'SYSTEM_DEFAULT'
    color_info_qos: 'SYSTEM_DEFAULT'
    infra1_info_qos: 'SYSTEM_DEFAULT'
    infra2_info_qos: 'SYSTEM_DEFAULT'
    # Для IMU отдельные параметры QoS не видны, используются общие

    # ========== TF и фреймы ==========
    publish_tf: true
    tf_publish_rate: 0.0
    # base_frame_id: 'link'
    # tf_prefix нет в списке – возможно, не используется в вашей версии

    # ========== Прочие ==========
    clip_distance: -1.0
    diagnostics_period: 1.0
    enable_rgbd: false
    camera_name: 'camera'                   # имя камеры (если нужно)
    # Метаданные включаются автоматически

    # ========== Дополнительные параметры из списка ==========
    # Если нужны расширенные настройки сенсоров, можно добавить:
    # depth_module.emitter_enabled: true
    # depth_module.laser_power: 150            # 0-360
    # depth_module.enable_auto_exposure: true
    # depth_module.auto_exposure_limit: 5000
    # depth_module.auto_gain_limit: 128
    # depth_module.auto_exposure_roi.top: 0
    # depth_module.auto_exposure_roi.bottom: 0
    # depth_module.auto_exposure_roi.left: 0
    # depth_module.auto_exposure_roi.right: 0
    # rgb_camera.enable_auto_exposure: true
    # rgb_camera.exposure: 200
    # rgb_camera.gain: 64
    # rgb_camera.white_balance: 4600
    # rgb_camera.enable_auto_white_balance: true